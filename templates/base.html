<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}IR Simulation{% endblock %} | Incident Response Simulator</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo">
                <span class="logo-icon">&#x1F6E1;</span>
                IR Simulator
            </a>
            <ul class="nav-links">
                <li><a href="/">Scenarios</a></li>
                <li><a href="/glossary">Glossary</a></li>
                <li><a href="/about">About</a></li>
            </ul>
        </div>
    </nav>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <div class="footer-container">
            <p>Incident Response Simulator &mdash; For legal &amp; policy professionals</p>
        </div>
    </footer>

    {% block scripts %}{% endblock %}
</body>
</html>
